<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yasui — Login / Cadastro</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* RESET */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #f4f1ec;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

/* CONTAINER */
.container {
    background: white;
    padding: 40px;
    width: 350px;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
}

/* TÍTULO */
h1 {
    font-family: 'Cinzel', serif;
    text-align: center;
    margin-bottom: 20px;
}

/* TABS */
.tabs {
    display: flex;
    margin-bottom: 20px;
}

.tabs button {
    flex: 1;
    padding: 10px;
    border: none;
    cursor: pointer;
    background: #ddd;
    font-weight: 600;
}

.tabs button.active {
    background: #1b1b1b;
    color: white;
}

/* FORM */
form {
    display: none;
    flex-direction: column;
}

form.active {
    display: flex;
}

input {
    margin-bottom: 15px;
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 6px;
}

/* BOTÃO */
button.submit {
    background: #1b1b1b;
    color: white;
    padding: 10px;
    border: none;
    cursor: pointer;
    border-radius: 6px;
}

button.submit:hover {
    background: #333;
}

</style>

</head>

<body>

<div class="container">

<h1>Yasui</h1>

<div class="tabs">
<button id="loginTab" class="active">Login</button>
<button id="cadastroTab">Cadastro</button>
</div>

<!-- LOGIN -->
<form id="loginForm" class="active">
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Senha" required>
<button class="submit">Entrar</button>
</form>

<!-- CADASTRO -->
<form id="cadastroForm">
<input type="text" placeholder="Nome" required>
<input type="email" placeholder="Email" required>
<input type="password" placeholder="Senha" required>
<button class="submit">Cadastrar</button>
</form>

</div>

<script>

const loginTab = document.getElementById("loginTab");
const cadastroTab = document.getElementById("cadastroTab");

const loginForm = document.getElementById("loginForm");
const cadastroForm = document.getElementById("cadastroForm");

loginTab.onclick = () => {
    loginTab.classList.add("active");
    cadastroTab.classList.remove("active");

    loginForm.classList.add("active");
    cadastroForm.classList.remove("active");
};

cadastroTab.onclick = () => {
    cadastroTab.classList.add("active");
    loginTab.classList.remove("active");

    cadastroForm.classList.add("active");
    loginForm.classList.remove("active");
};

</script>

</body>
</html>
